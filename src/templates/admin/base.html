<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - OverwatchStats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        .nav { background: #16213e; padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem; }
        .nav h1 { font-size: 1.2rem; color: #ff6b35; }
        .nav a { color: #a0a0c0; text-decoration: none; }
        .nav a:hover { color: #fff; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #2a2a4a; }
        th { background: #16213e; color: #a0a0c0; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: #1f1f3a; }
        .btn { display: inline-block; padding: 0.4rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
        .btn:hover { opacity: 0.85; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
        .badge-admin { background: #f39c12; color: #000; }
        .badge-disabled { background: #e74c3c; color: #fff; }
        .badge-active { background: #2ecc71; color: #000; }
        .flash { padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .flash-success { background: #2ecc71; color: #000; }
        .flash-error { background: #e74c3c; color: #fff; }
        form.inline { display: inline; }
        input[type="number"] { background: #2a2a4a; border: 1px solid #3a3a5a; color: #e0e0e0; padding: 0.3rem 0.5rem; border-radius: 3px; width: 80px; }
    </style>
</head>
<body>
    <nav class="nav">
        <h1>OverwatchStats Admin</h1>
        <a href="/admin/">Users</a>
    </nav>
    <div class="container">
        {% if flash_message %}
        <div class="flash flash-{{ flash_type|default('success') }}">{{ flash_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
